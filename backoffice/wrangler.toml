# Cloudflare Pages Configuration for Rioko Backoffice
# This file is used by the Pages CI/CD system to configure bindings and runtime settings.

name = "rioko-backoffice"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".next"

[vars]
SHOPIFY_API_VERSION = "2026-01"

[[kv_namespaces]]
binding = "INVOICE_KV"
id = "490b5fedae3e428d977d93745c1061b2"

[[d1_databases]]
binding = "DB"
database_name = "rioko-db"
database_id = "4c63109a-c05d-427f-abf2-1cb4a757df88"
