<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="28%" r="70%">
      <stop offset="0%"   stop-color="#0e2d52"/>
      <stop offset="55%"  stop-color="#071628"/>
      <stop offset="100%" stop-color="#020a12"/>
    </radialGradient>

    <!-- Top accent light -->
    <radialGradient id="topLight" cx="50%" cy="0%" r="55%">
      <stop offset="0%"   stop-color="#028dc4" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#028dc4" stop-opacity="0"/>
    </radialGradient>

    <!-- Card halos -->
    <radialGradient id="shopifyHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#5e8e3e" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5e8e3e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ixHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#32b294" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#32b294" stop-opacity="0"/>
    </radialGradient>

    <!-- Card shadow -->
    <filter id="cardShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- ─── BACKGROUND ─────────────────────────────────────────── -->
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <rect width="1080" height="1080" fill="url(#topLight)"/>

