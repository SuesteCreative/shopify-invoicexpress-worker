name = "shopify-invoicexpress-worker"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[vars]
SHOPIFY_SHOP_DOMAIN = "quickstart-66f9e5ef.myshopify.com"
SHOPIFY_API_VERSION = "2024-01"
INVOICEXPRESS_ACCOUNT_NAME = "ultramegasonico"

[[kv_namespaces]]
binding = "INVOICE_KV"
id = "your-kv-namespace-id-dev"

[env.production]
[env.production.vars]
SHOPIFY_SHOP_DOMAIN = "your-client-store.myshopify.com"
SHOPIFY_API_VERSION = "2024-01"
INVOICEXPRESS_ACCOUNT_NAME = "your-client-account-name"

[[env.production.kv_namespaces]]
binding = "INVOICE_KV"
id = "your-kv-namespace-id-prod"
